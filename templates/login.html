{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div>
    <h2>Login</h2>
    <form action="{{url_for('login')}}" method="POST">
        {{form.hidden_tag()}}
        <div>
            {{form.email.label}}
            {{form.email}}
        </div>
        <div>
            {{form.password.label}}
            {{form.password}}
        </div>
        {{form.submit}}
    </form>
</div>
{% endblock %}
